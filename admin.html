<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CashVibe | HQ Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;600&display=swap');
        
        body { background: #050505; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 30px; }
        
        .admin-header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); padding: 30px; border-radius: 20px;
            border: 1px solid rgba(0, 242, 254, 0.2); margin-bottom: 30px;
        }

        .logo h2 { font-family: 'Orbitron'; color: #00f2fe; margin: 0; letter-spacing: 3px; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border-left: 4px solid #00f2fe; text-align: center; }
        .stat-box h4 { font-size: 12px; color: #888; margin-bottom: 5px; }
        .stat-box p { font-size: 24px; font-weight: bold; font-family: 'Orbitron'; color: #fdfc47; }

        .table-wrap { background: rgba(255,255,255,0.02); border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); overflow: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: rgba(0, 242, 254, 0.1); padding: 20px; text-align: left; color: #00f2fe; font-size: 11px; text-transform: uppercase; }
        td { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }
        tr:hover { background: rgba(0, 242, 254, 0.05); }

        .btn-wa { background: #25D366; color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 11px; }
        .btn-wa:hover { box-shadow: 0 0 20px #25D366; transform: scale(1.05); }

        .status-pill { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; background: rgba(253, 252, 71, 0.1); color: #fdfc47; border: 1px solid #fdfc47; }

        ::-webkit-scrollbar { height: 8px; background: #000; }
        ::-webkit-scrollbar-thumb { background: #00f2fe; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="admin-header">
        <div class="logo"><h2>CASHVIBE HQ</h2></div>
        <div class="user-id">Logged in as: <b>M.R JAY</b></div>
    </div>

    <div class="stat-grid">
        <div class="stat-box"><h4>Total Enrolled</h4><p id="totalUsers">0</p></div>
        <div class="stat-box"><h4>Pending Verification</h4><p id="pendingUsers">0</p></div>
        <div class="stat-box"><h4>System Load</h4><p>LOW</p></div>
        <div class="stat-box"><h4>Founder Contact</h4><p>9288678795</p></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Time</th>
                    <th>Tester Name</th>
                    <th>WhatsApp Link</th>
                    <th>Email Address</th>
                    <th>Hardware</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="db-content"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQGMwY2Aow-BPwnkiElXvjyAgLyjDHjpk",
            databaseURL: "https://freerecharge-e10e5-default-rtdb.firebaseio.com",
            projectId: "freerecharge-e10e5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // WhatsApp Custom Template
        window.sendWA = (name, phone) => {
            const adminPhone = "9288678795"; // Aapka context number
            const text = `🚀 *CASHVIBE BETA ACCESS PROTOCOL* 🚀%0A%0AHello *${name}*,%0A%0ACashVibe Beta Testing mein join karne ke liye dhanyawad.%0A%0A*⚠️ IMPORTANT NOTICE:*%0A1. All coins in Beta mode are *VIRTUAL*.%0A2. Real rewards will be given to active testers on official launch.%0A3. Founder contact is available for 24/7 support.%0A%0A*🔑 LOGIN CREDENTIALS:*%0A*ID:* [USER_ID_HERE]%0A*PASS:* [PASSWORD_HERE]%0A%0A---%0A*FOUNDER:* M.R JAY%0A*EMAIL:* freerecharge-e10e5@support.com%0A---%0A%0A_Please reply with 'READY' to start testing._`;
            window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
        };

        onValue(ref(db, 'users'), (snapshot) => {
            const table = document.getElementById('db-content');
            table.innerHTML = "";
            let count = 0;
            snapshot.forEach((child) => {
                count++;
                const user = child.val();
                table.innerHTML += `
                    <tr>
                        <td style="color:#00f2fe">#${count}</td>
                        <td style="font-size:10px">${user.timestamp}</td>
                        <td><b>${user.name}</b></td>
                        <td>${user.whatsapp}</td>
                        <td>${user.email}</td>
                        <td>${user.device}</td>
                        <td>${user.city}, ${user.state}</td>
                        <td><span class="status-pill">${user.status}</span></td>
                        <td><button class="btn-wa" onclick="sendWA('${user.name}', '${user.whatsapp}')"><i class="fab fa-whatsapp"></i> VERIFY USER</button></td>
                    </tr>`;
            });
            document.getElementById('totalUsers').innerText = count;
            document.getElementById('pendingUsers').innerText = count;
        });
    </script>
</body>
</html>
