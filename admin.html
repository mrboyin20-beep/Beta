<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CashVibe | HQ Live Database</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;600&display=swap');
        body { background: #050505; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; border: 1px solid rgba(0, 242, 254, 0.2); margin-bottom: 20px; }
        .logo h2 { font-family: 'Orbitron'; color: #00f2fe; margin: 0; letter-spacing: 2px; }
        .table-wrap { background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); overflow-x: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: rgba(0, 242, 254, 0.1); padding: 15px; text-align: left; color: #00f2fe; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid rgba(0,242,254,0.3); }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; color: #ccc; }
        tr:hover { background: rgba(0, 242, 254, 0.05); }
        .btn-wa { background: #25D366; color: #000; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 10px; }
        .status-pill { padding: 3px 8px; border-radius: 6px; font-size: 10px; background: rgba(253, 252, 71, 0.1); color: #fdfc47; border: 1px solid #fdfc47; }
    </style>
</head>
<body>

    <div class="admin-header">
        <div class="logo"><h2>CASHVIBE HQ</h2></div>
        <div id="status-light" style="color:#00ff88; font-size: 12px;"><i class="fa fa-circle"></i> SYSTEM LIVE</div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Date/Time</th>
                    <th>Name</th>
                    <th>WhatsApp</th>
                    <th>Device</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="db-content">
                <tr><td colspan="8" style="text-align:center; padding:50px;">📡 Connecting to Firebase...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // AAPKA CONFIG (Check karein koi extra space na ho)
        const firebaseConfig = {
            apiKey: "AIzaSyBQGMwY2Aow-BPwnkiElXvjyAgLyjDHjpk",
            authDomain: "freerecharge-e10e5.firebaseapp.com",
            databaseURL: "https://freerecharge-e10e5-default-rtdb.firebaseio.com",
            projectId: "freerecharge-e10e5",
            storageBucket: "freerecharge-e10e5.firebasestorage.app",
            messagingSenderId: "152498311003",
            appId: "1:152498311003:web:5ce6f3f6fe8fcebec3d47e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tableBody = document.getElementById('db-content');

        // IMPORTANT: Path wahi rakhein jo aapke Firebase console mein dikh raha hai
        // Agar console mein 'beta_registrations' hai toh niche wahi likhein
        const dbPath = 'beta_registrations'; 

        onValue(ref(db, dbPath), (snapshot) => {
            if (snapshot.exists()) {
                tableBody.innerHTML = "";
                let count = 0;
                snapshot.forEach((child) => {
                    count++;
                    const user = child.val();
                    tableBody.innerHTML += `
                        <tr>
                            <td style="color:#00f2fe">#${count}</td>
                            <td>${user.timestamp || 'N/A'}</td>
                            <td><b>${user.name || 'Unknown'}</b></td>
                            <td>${user.whatsapp || 'No Number'}</td>
                            <td>${user.device || '-'}</td>
                            <td>${user.city || '-'}, ${user.state || '-'}</td>
                            <td><span class="status-pill">${user.status || 'NEW'}</span></td>
                            <td>
                                <button class="btn-wa" onclick="window.open('https://wa.me/${user.whatsapp}?text=Hello ${user.name}, Welcome to CashVibe!','_blank')">
                                    VERIFY
                                </button>
                            </td>
                        </tr>`;
                });
            } else {
                tableBody.innerHTML = "<tr><td colspan='8' style='text-align:center; padding:50px;'>❌ No Data Found in Path: " + dbPath + "</td></tr>";
            }
        }, (error) => {
            tableBody.innerHTML = "<tr><td colspan='8' style='text-align:center; color:red;'>Permission Denied! Check Firebase Rules.</td></tr>";
            console.error(error);
        });
    </script>
</body>
</html>
